[mypy]
plugins = mypy.plugins.proper_plugin, hydpy/mypy_plugin.py
check_untyped_defs = True
enable_error_code =
    ignore-without-code,
    name-defined,
    redundant-expr,
    redundant-self,
    truthy-bool,
    truthy-iterable,
    unused-awaitable
exclude = HydPy-H-Lahn
extra_checks = True
ignore_missing_imports = True
warn_redundant_casts = True
warn_unreachable = True
warn_unused_ignores = True

[hydpy.mypy_plugin]
relevant_sources = hydpy

[mypy-hydpy.docs.auto.*]
ignore_errors = True

[mypy-hydpy.interfaces.*]
disable_error_code = empty-body

[mypy-hydpy.models.*]
disable_error_code = type-abstract

[mypy-hydpy.tests.iotesting.*]
ignore_errors = True
